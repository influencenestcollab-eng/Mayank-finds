<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mayank Finds</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-shell">
    <header>
      <div class="container header-inner">
        <a href="#" class="brand">Mayank <span>Finds</span></a>
        <div class="search-wrap">
          <input
            id="searchInput"
            class="search-input"
            type="search"
            placeholder="Search products..."
            aria-label="Search products"
          >
        </div>
      </div>
    </header>

    <main>
      <section class="hero">
        <div class="container">
          <div class="hero-card">
            <div class="hero-kicker">Handpicked affiliate picks</div>
            <h1>Everyday gadgets and useful finds, all in one place.</h1>
          </div>
        </div>
      </section>

      <section class="products-section">
        <div class="container">
          <div class="section-box">
            <div class="section-heading">
              <h2>Featured Products</h2>
              <div id="resultsCount" class="results-count">Loading products...</div>
            </div>

            <div id="statusMessage" class="status-message">Loading products...</div>
            <div id="productGrid" class="product-grid"></div>
            <div id="emptyState" class="empty-state">No products found. Try a different search.</div>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <div class="container">
        <div class="footer-box">
          As an Amazon Associate, I earn from qualifying purchases.
        </div>
      </div>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
